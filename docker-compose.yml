services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: brand_backend
    ports:
      - "9000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./log:/app/log
      - ./src:/app/src
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - app_network
    restart: unless-stopped

  # React/Vite Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brand_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:9000
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge
