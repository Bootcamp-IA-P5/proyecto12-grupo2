services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.demo
    ports:
      - "8501:8501"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    restart: unless-stopped
    command: npm run dev
